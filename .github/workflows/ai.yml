name: Commit Summary Bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Wumpus-Central repo
        uses: actions/checkout@v4
        with:
          repository: Wumpus-Central/Wumpus-Central
          fetch-depth: 2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install OpenAI SDK
        run: npm i openai

      - name: Run summarizer
        env:
          BUILD_SUMMARIES_DISCORD_WEBHOOK: ${{ secrets.BUILD_SUMMARIES_DISCORD_WEBHOOK }}
        run: |
          node <<'EOF'
          import OpenAI from "openai";
          import { execSync } from "node:child_process";

          const webhook = process.env.BUILD_SUMMARIES_DISCORD_WEBHOOK;

          const client = new OpenAI({
            apiKey: "public",
            baseURL: "https://opencode.ai/zen/v1"
          });

          let prev = "";
          let curr = execSync("git rev-parse HEAD").toString().trim();

          try {
            prev = execSync("git rev-parse HEAD~1").toString().trim();
          } catch {
            console.log("No previous commit, skipping");
            process.exit(0);
          }

          const diff = execSync(`git diff ${prev} ${curr}`)
            .toString()
            .slice(0, 50000);

          const response = await client.chat.completions.create({
            model: "big-pickle",
            max_tokens: 800,
            messages: [
              {
                role: "system",
                content:
                  "You are a git diff summarizer.\n" +
                  "Output EXACTLY:\n" +
                  "Line 1: commit title (max 72 chars, conventional commit style)\n" +
                  "Line 2: short technical summary (max 3 sentences)\n" +
                  "Ignore minified/bundler/lockfile noise and formatting-only changes.\n" +
                  "If no meaningful change, output: chore: no meaningful changes"
              },
              {
                role: "user",
                content: `Summarize this diff:\n${diff}`
              }
            ]
          });

          const summary =
            response?.choices?.[0]?.message?.content ||
            "chore: api returned invalid response";

          console.log(summary);

          await fetch(webhook, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content: "🧠 **Repo Update Summary**\n\n" + summary
            })
          });
          EOF
