name: Commit Summary Bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get previous commit
        id: commits
        run: |
          CURR=$(git rev-parse HEAD)
          PREV=$(git rev-parse HEAD~1 || echo "")

          echo "CURR=$CURR" >> $GITHUB_ENV
          echo "PREV=$PREV" >> $GITHUB_ENV

      - name: Build diff
        run: |
          if [ -z "$PREV" ]; then
            echo "No previous commit, skipping diff"
            exit 0
          fi

          git diff $PREV $CURR > diff.txt

          # cap diff to avoid token explosions
          head -c 50000 diff.txt > trimmed_diff.txt

      - name: Call OpenCode Zen API
        run: |
          DIFF=$(jq -Rs . trimmed_diff.txt)

          curl -s https://opencode.ai/zen/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer public" \
            -H "x-opencode-client: cli" \
            -H "x-opencode-project: global" \
            -d "{
              \"model\": \"big-pickle\",
              \"max_tokens\": 800,
              \"system\": [
                {
                  \"type\": \"text\",
                  \"text\": \"You are a git diff summarizer.\n\nOutput EXACTLY:\nLine 1: commit title (max 72 chars, conventional commit style)\nLine 2: short technical summary (max 3 sentences)\n\nRules:\n- Ignore minified/bundler/lockfile/formatting changes\n- Focus only on semantic code changes\n- If no meaningful change, output: chore: no meaningful changes\n- Never hallucinate intent\"
                }
              ],
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": [
                    {
                      \"type\": \"text\",
                      \"text\": \"Summarize this git diff:\\n$DIFF\"
                    }
                  ]
                }
              ],
              \"tools\": []
            }" > response.json

          cat response.json

      - name: Extract summary
        run: |
          SUMMARY=$(jq -r '
            .choices[0].message.content // "chore: api returned invalid response"
          ' response.json)

          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send to Discord webhook
        run: |
          CONTENT=$(echo "$SUMMARY" | tr '\n' ' ')

          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"content\": \"🧠 **Repo Update Summary**\\n\\n$CONTENT\"
            }" \
            "${{ secrets.BUILD_SUMMARIES_DISCORD_WEBHOOK }}"
